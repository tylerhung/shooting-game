<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>Minecraft FPS: 隨機迷宮挑戰</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; }
        #ui { position: absolute; top: 20px; left: 20px; color: #fff; font-size: 24px; z-index: 100; text-shadow: 2px 2px #000; pointer-events: none; }
        #hp-bar-bg { width: 200px; height: 20px; background: #333; border: 2px solid #000; margin-top: 10px; }
        #hp-bar-fill { width: 100%; height: 100%; background: #ff4444; transition: width 0.3s; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 8px; height: 8px; border: 1px solid rgba(255,255,255,0.9); transform: translate(-50%, -50%); z-index: 100; pointer-events: none; }
        #overlay, #game-over { position: absolute; width: 100%; height: 100%; background: rgba(0,0,0,0.8); color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 200; cursor: pointer; text-align: center; }
        #game-over { display: none; background: rgba(80, 0, 0, 0.95); }
        .btn { background: #458b74; padding: 12px 24px; border: none; color: white; font-size: 18px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <div id="ui">
        擊殺: <span id="score">0</span>
        <div id="hp-bar-bg"><div id="hp-bar-fill"></div></div>
        HP: <span id="hp-text">100</span>
        <div id="timer-ui" style="font-size: 18px; color: #ffeb3b; margin-top: 5px;">生存時間: <span id="time-clock">0</span>s</div>
    </div>
    <div id="crosshair"></div>
    <div id="overlay" onclick="startGame()">
        <h1>RANDOM DUNGEON OPS</h1>
        <p>點擊生成隨機迷宮並開戰</p>
        <p style="font-size: 12px; color: #888;">已修復多重擊殺 Bug | 360° 全視角</p>
    </div>
    <div id="game-over">
        <h1>挑戰結束</h1>
        <p>最終得分: <span id="final-score">0</span></p>
        <button class="btn" onclick="resetGame()">再次生成地圖</button>
    </div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        let gameRunning = false, score = 0, hp = 100, weaponBob = 0, walkCycle = 0;
        let startTime = 0, lastSpawnTime = 0, lastDamageTime = 0;
        let player = { x: 1.5, y: 1.5, dir: 0, pitch: 0 };
        let keys = {}, zBuffer = [], enemies = [], particles = [];

        // --- 1. 隨機迷宮生成器 ---
        const worldW = 17, worldH = 13; // 需為奇數效果較好
        let world = [];

        function generateMaze() {
            world = Array(worldW * worldH).fill(1);
            function idx(x, y) { return y * worldW + x; }
            function carve(x, y) {
                world[idx(x, y)] = 0;
                let dirs = [[0, -2], [0, 2], [-2, 0], [2, 0]].sort(() => Math.random() - 0.5);
                for (let [dx, dy] of dirs) {
                    let nx = x + dx, ny = y + dy;
                    if (nx > 0 && nx < worldW - 1 && ny > 0 && ny < worldH - 1 && world[idx(nx, ny)] === 1) {
                        world[idx(x + dx / 2, y + dy / 2)] = 0;
                        carve(nx, ny);
                    }
                }
            }
            carve(1, 1);
            // 確保起始區域開闊
            world[idx(1, 2)] = 0; world[idx(2, 1)] = 0; world[idx(2, 2)] = 0;
        }

        // --- 2. 素材載入 ---
        const assets = {
            skeleton: { img: new Image(), src: 'skeleton.png', ready: false },
            wall: { img: new Image(), src: 'wall.png', ready: false },
            arm: { img: new Image(), src: 'steve_arm.png', ready: false }
        };
        Object.keys(assets).forEach(key => {
            assets[key].img.src = assets[key].src;
            assets[key].img.onload = () => { assets[key].ready = true; };
        });

        function isWall(x, y) {
            let tx = Math.floor(x), ty = Math.floor(y);
            if (tx < 0 || tx >= worldW || ty < 0 || ty >= worldH) return true;
            return world[ty * worldW + tx] === 1;
        }

        function createEnemy() {
            let rx, ry;
            do {
                rx = Math.floor(Math.random() * worldW) + 0.5;
                ry = Math.floor(Math.random() * worldH) + 0.5;
            } while (isWall(rx, ry) || Math.sqrt((rx-player.x)**2 + (ry-player.y)**2) < 4);
            enemies.push({x: rx, y: ry, dead: false, dir: Math.random() * Math.PI * 2});
        }

        function startGame() {
            generateMaze();
            document.getElementById('overlay').style.display = 'none';
            canvas.requestPointerLock();
            gameRunning = true;
            startTime = Date.now();
            lastSpawnTime = Date.now();
            enemies = [];
            for(let i=0; i<3; i++) createEnemy();
        }

        function resetGame() {
            score = 0; hp = 100; player = { x: 1.5, y: 1.5, dir: 0, pitch: 0 };
            document.getElementById('score').innerText = "0";
            updateHPUI();
            document.getElementById('game-over').style.display = 'none';
            startGame();
        }

        window.addEventListener('keydown', e => keys[e.code] = true);
        window.addEventListener('keyup', e => keys[e.code] = false);
        document.addEventListener('mousemove', e => {
            if (document.pointerLockElement === canvas && gameRunning) {
                player.dir += e.movementX * 0.0015;
                player.pitch = Math.max(-0.6, Math.min(0.6, player.pitch - e.movementY * 0.0015));
            }
        });

        // 點擊射擊
        window.addEventListener('mousedown', () => {
            if (!gameRunning || hp <= 0) return;
            weaponBob = 50;
            checkPrecisionKill(); // 呼叫精準擊殺判定
        });

        // --- 核心修正：擊中一個就停止 ---
        function checkPrecisionKill() {
            let hits = [];
            enemies.forEach((en, i) => {
                if (en.dead) return;
                let dx = en.x - player.x, dy = en.y - player.y, dist = Math.sqrt(dx*dx + dy*dy);
                let angle = Math.atan2(dy, dx) - player.dir;
                while(angle < -Math.PI) angle += Math.PI*2; while(angle > Math.PI) angle -= Math.PI*2;
                
                // 增加垂直視角(pitch)對準判定
                if(Math.abs(angle) < 0.12 && Math.abs(player.pitch) < 0.3 && dist < 10) {
                    let blocked = false;
                    for(let d = 0; d < dist; d += 0.1) {
                        if(isWall(player.x + Math.cos(player.dir + angle) * d, player.y + Math.sin(player.dir + angle) * d)) {
                            blocked = true; break;
                        }
                    }
                    if(!blocked) hits.push({ index: i, dist: dist });
                }
            });

            if (hits.length > 0) {
                // 只取距離最近的那一個
                hits.sort((a, b) => a.dist - b.dist);
                let target = enemies[hits[0].index];
                target.dead = true;
                score++;
                document.getElementById('score').innerText = score;
            }
            enemies = enemies.filter(en => !en.dead);
        }

        function update() {
            if (!gameRunning || hp <= 0) return;
            let elapsed = (Date.now() - startTime) / 1000;
            document.getElementById('time-clock').innerText = Math.floor(elapsed);

            let spawnInterval = Math.max(2000, 10000 - (elapsed * 150)); 
            if (Date.now() - lastSpawnTime > spawnInterval) { createEnemy(); lastSpawnTime = Date.now(); }

            let speed = 0.035, isMoving = false;
            let nx = player.x, ny = player.y;
            if (keys['KeyW']) { nx += Math.cos(player.dir) * speed; ny += Math.sin(player.dir) * speed; isMoving = true; }
            if (keys['KeyS']) { nx -= Math.cos(player.dir) * speed; ny -= Math.sin(player.dir) * speed; isMoving = true; }
            if (keys['KeyA']) { nx += Math.sin(player.dir) * speed; ny -= Math.cos(player.dir) * speed; isMoving = true; }
            if (keys['KeyD']) { nx -= Math.sin(player.dir) * speed; ny += Math.cos(player.dir) * speed; isMoving = true; }
            
            // 滑動碰撞檢查
            if (!isWall(nx, player.y)) player.x = nx;
            if (!isWall(player.x, ny)) player.y = ny;
            
            if (isMoving) walkCycle += 0.1;
            weaponBob *= 0.88;

            enemies.forEach(en => {
                let dx = player.x - en.x, dy = player.y - en.y, dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < 0.7 && Date.now() - lastDamageTime > 3000) {
                    hp -= (Math.floor(Math.random() * 11) + 5);
                    lastDamageTime = Date.now(); updateHPUI();
                    if (hp <= 0) endGame();
                }
                let enSpeed = (elapsed > 60) ? 0.025 : 0.018;
                en.dir = (dist < 6) ? Math.atan2(dy, dx) : en.dir + (Math.random() < 0.02 ? (Math.random()-0.5) : 0);
                let ex = en.x + Math.cos(en.dir) * enSpeed, ey = en.y + Math.sin(en.dir) * enSpeed;
                if (!isWall(ex, ey)) { en.x = ex; en.y = ey; } else { en.dir += (Math.random() > 0.5 ? 1 : -1) * Math.PI/2; }
                if (elapsed > 60 && Math.random() < 0.2) particles.push({x: en.x, y: en.y, h: Math.random() * 2, life: 30});
            });
            particles = particles.filter(p => { p.h += 0.05; p.life--; return p.life > 0; });
        }

        function updateHPUI() {
            let p = Math.max(0, hp);
            document.getElementById('hp-bar-fill').style.width = p + "%";
            document.getElementById('hp-text').innerText = p;
        }

        function endGame() {
            gameRunning = false; document.exitPointerLock();
            document.getElementById('final-score').innerText = score;
            document.getElementById('game-over').style.display = 'flex';
        }

        function render() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            let horizon = (canvas.height / 2) + (player.pitch * canvas.height);
            ctx.fillStyle = "#729ed9"; ctx.fillRect(0, 0, canvas.width, horizon);
            ctx.fillStyle = "#4a7a39"; ctx.fillRect(0, horizon, canvas.width, canvas.height - horizon);

            const rays = 400, fov = Math.PI/3, w = canvas.width / rays;
            zBuffer = [];
            for(let i=0; i<rays; i++) {
                let angle = (player.dir - fov/2) + (i/rays) * fov;
                let d = 0, vx = Math.cos(angle), vy = Math.sin(angle);
                while(d < 15) {
                    d += 0.04;
                    if(isWall(player.x + vx*d, player.y + vy*d)) {
                        let correctedD = d * Math.cos(angle - player.dir);
                        zBuffer[i] = correctedD;
                        let h = canvas.height / correctedD;
                        if(assets.wall.ready) ctx.drawImage(assets.wall.img, i * w, horizon - h/2, w + 1, h);
                        ctx.fillStyle = `rgba(0,0,0,${Math.min(d/14, 0.8)})`;
                        ctx.fillRect(i * w, horizon - h/2, w + 1, h);
                        break;
                    }
                }
            }

            particles.forEach(p => {
                let dx = p.x - player.x, dy = p.y - player.y, dist = Math.sqrt(dx*dx+dy*dy);
                let angle = Math.atan2(dy, dx) - player.dir;
                while(angle < -Math.PI) angle += Math.PI*2; while(angle > Math.PI) angle -= Math.PI*2;
                if(Math.abs(angle) < fov/2) {
                    let sx = (angle/fov + 0.5) * canvas.width;
                    let py = horizon - (p.h * (canvas.height / dist));
                    ctx.fillStyle = `rgba(255, 0, 0, ${p.life/30})`;
                    ctx.fillRect(sx, py, 4, 4);
                }
            });

            enemies.forEach(en => {
                let dx = en.x - player.x, dy = en.y - player.y, dist = Math.sqrt(dx*dx+dy*dy);
                let angle = Math.atan2(dy, dx) - player.dir;
                while(angle < -Math.PI) angle += Math.PI*2; while(angle > Math.PI) angle -= Math.PI*2;
                if(Math.abs(angle) < fov/2) {
                    let sx = (angle/fov + 0.5) * canvas.width, rayIdx = Math.floor((angle/fov + 0.5) * rays);
                    if(dist < (zBuffer[rayIdx] || 15) + 0.1) {
                        let h = (canvas.height / dist) * 1.5, sw = h * 0.6;
                        if(assets.skeleton.ready) ctx.drawImage(assets.skeleton.img, sx - sw/2, horizon - h/2, sw, h);
                    }
                }
            });

            if (hp > 0) {
                let idleX = Math.sin(walkCycle) * 10, idleY = Math.abs(Math.cos(walkCycle)) * 8 - weaponBob;
                let armW = canvas.width * 0.15, armH = armW * 1.8;
                let vOffset = player.pitch * 200;
                if(assets.arm.ready) {
                    ctx.drawImage(assets.arm.img, 20 + idleX, canvas.height - armH*0.8 + idleY + vOffset, armW, armH);
                    ctx.save(); ctx.scale(-1, 1);
                    ctx.drawImage(assets.arm.img, -canvas.width + 20 - idleX, canvas.height - armH*0.9 + idleY + vOffset, armW*1.1, armH*1.1);
                    ctx.restore();
                }
                drawTrident(canvas.width - armW*1.2 - idleX, canvas.height - armH*0.7 + idleY + vOffset, 1.2, -0.2);
            }
        }

        function drawTrident(x, y, scale, angle) {
            ctx.save(); ctx.translate(x, y); ctx.rotate(angle); ctx.scale(scale, scale);
            ctx.fillStyle = "#2e5a4d"; ctx.fillRect(-3, 0, 6, 250);
            const grad = ctx.createLinearGradient(0, -60, 0, 0);
            grad.addColorStop(0, "#e0ffff"); grad.addColorStop(1, "#458b74");
            ctx.fillStyle = grad;
            ctx.fillRect(-15, -10, 30, 8); ctx.fillRect(-15, -40, 5, 30); ctx.fillRect(10, -40, 5, 30);
            ctx.beginPath(); ctx.moveTo(-5, 0); ctx.lineTo(5, 0); ctx.lineTo(0, -60); ctx.fill();
            ctx.restore();
        }

        function loop() { update(); render(); requestAnimationFrame(loop); }
        loop();
    </script>
</body>
</html>
